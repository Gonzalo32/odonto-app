<div class="step-wrapper">
  <h2 class="step-title">Cobertura Médica</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="obraSocial">Obra Social / Prepaga</label>
      <div class="autocomplete-container">
        <input 
          id="obraSocial" 
          type="text" 
          formControlName="obraSocial" 
          autocomplete="off" 
          placeholder="Ej: OSDE, Swiss Medical"
          (input)="filterObras()"
          (focus)="showDropdown.set(true); filterObras()"
          (blur)="hideDropdown()"
        >
        
        <div class="options-list" *ngIf="showDropdown()">
          <div 
            class="option-item" 
            *ngFor="let obra of filteredObras()" 
            (click)="selectObra(obra)"
          >
            {{ obra }}
          </div>
          <div class="no-results" *ngIf="filteredObras().length === 0">
            No se encontraron resultados
          </div>
        </div>
      </div>

      @if (form.controls.obraSocial.invalid && form.controls.obraSocial.touched) {
        <span class="error-msg" style="color: var(--error-color);">Ingrese su obra social</span>
      }
    </div>

    <div class="form-group" style="margin-top: var(--spacing-md);">
      <label for="numeroAfiliado">Número de Afiliado (Opcional)</label>
      <input 
        id="numeroAfiliado" 
        type="text" 
        formControlName="numeroAfiliado" 
        autocomplete="off" 
        placeholder="Ej: 123456789"
        inputmode="numeric"
        pattern="[0-9]*"
        (input)="onInput($event)"
      >
    </div>

    <div class="actions">
      <button type="button" class="btn-secondary" (click)="onPrevious()">Atrás</button>
      <button type="submit" class="btn-primary" [disabled]="form.invalid">Siguiente</button>
    </div>
  </form>
</div>
